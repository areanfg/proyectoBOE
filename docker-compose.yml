version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: postgres_boE

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: oposiciones

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - ./admitidos.csv:/tmp/admitidos.csv

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_boe

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "8080:80"

    depends_on:
      - postgres

volumes:
  postgres_data: